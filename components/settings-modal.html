<!-- Settings Modal -->
    <div class="modal-overlay" id="settings-modal">
        <div class="modal">
            <div class="modal-header">
                <h3 class="modal-title">Parametres</h3>
                <button class="modal-close" onclick="closeModal('settings-modal')"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>URL API Google Script</label>
                    <input type="url" class="form-control" id="settings-url" placeholder="https://script.google.com/...">
                </div>
                <div class="form-group">
                    <label>Mot de passe secret (PWA_SECRET)</label>
                    <input type="password" class="form-control" id="settings-secret" placeholder="RENTCAR">
                </div>
                <div style="padding: 16px; background: var(--primary-light); border-radius: var(--radius-sm); margin-top: 16px;">
                    <p style="font-size: 13px; color: var(--primary-dark); line-height: 1.6;">
                        <i class="fas fa-info-circle"></i> Entrez l'URL de votre Google Apps Script et le code secret de votre sheet pour connecter l'application. Ces informations sont stockees localement sur votre appareil.
                    </p>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal('settings-modal')">Fermer</button>
                <button class="btn btn-primary" onclick="saveSettings()"><i class="fas fa-save"></i> Sauvegarder</button>
            </div>
        </div>
    </div>
