<div class="app-container">
        <header class="app-header">
            <div class="header-top">
                <div class="header-logo">
                    <img src="assets/pwa.png" alt="Yaro" class="brand-logo brand-logo-header">
                    <div><h1>Yaro</h1><span>Admin Panel</span></div>
                </div>
                <div class="header-actions">
                    <button class="btn-icon" onclick="refreshData()" title="Rafraîchir"><i class="fas fa-sync-alt"></i></button>
                    <button class="btn-icon" onclick="showSyncModal()" title="Sync GitHub"><i class="fas fa-cloud-upload-alt"></i></button>
                </div>
            </div>
        </header>

        <div class="stats-grid">
            <div class="stat-card">
                <span class="label">Vehicules</span>
                <span class="value" id="stat-cars">0</span>
                <span class="change positive"><i class="fas fa-car"></i> Actifs</span>
            </div>
            <div class="stat-card">
                <span class="label">Reservations</span>
                <span class="value" id="stat-res">0</span>
                <span class="change" id="stat-pending"><i class="fas fa-clock"></i> 0 en attente</span>
            </div>
        </div>

        <div class="tab-nav">
            <button class="tab-btn active" onclick="switchTab('cars')">
                <i class="fas fa-car"></i> Vehicules <span class="badge" id="tab-badge-cars">0</span>
            </button>
            <button class="tab-btn" onclick="switchTab('reservations')">
                <i class="fas fa-calendar-check"></i> Reservations <span class="badge" id="tab-badge-res">0</span>
            </button>
        </div>

        <div class="content-area active" id="cars-section">
            <div class="search-bar">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="Rechercher un vehicule..." id="car-search" oninput="filterCars()">
            </div>
            <div class="filter-chips" id="car-filters">
                <button class="chip active" onclick="filterByType('all')">Tous</button>
                <button class="chip" onclick="filterByType('automatic')">Auto</button>
                <button class="chip" onclick="filterByType('manual')">Manuelle</button>
                <button class="chip" onclick="filterByType('diesel')">Diesel</button>
                <button class="chip" onclick="filterByType('petrol')">Essence</button>
            </div>
            <div id="cars-list">
                <div class="empty-state">
                    <i class="fas fa-car-side"></i>
                    <h3>Aucun vehicule</h3>
                    <p>Ajoutez votre premier vehicule en cliquant sur le bouton +</p>
                </div>
            </div>
        </div>

        <div class="content-area" id="reservations-section">
            <div class="search-bar">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="Rechercher une reservation..." id="res-search" oninput="filterReservations()">
            </div>
            <div class="filter-chips" id="res-filters">
                <button class="chip active" onclick="filterByStatus('all')">Tous</button>
                <button class="chip" onclick="filterByStatus('En attente')">En attente</button>
                <button class="chip" onclick="filterByStatus('Confirmee')">Confirmees</button>
                <button class="chip" onclick="filterByStatus('Refusee')">Refusees</button>
                <button class="chip" onclick="filterByStatus('Annulee')">Annulees</button>
            </div>
            <div id="reservations-list">
                <div class="empty-state">
                    <i class="fas fa-calendar"></i>
                    <h3>Aucune reservation</h3>
                    <p>Les reservations apparaitront ici automatiquement</p>
                </div>
            </div>
        </div>

        <button class="fab" id="fab-cars" onclick="openCarModal()"><i class="fas fa-plus"></i></button>
        <button class="fab reservations" id="fab-res" onclick="openReservationModal()" style="display:none"><i class="fas fa-plus"></i></button>
    </div>
